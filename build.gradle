plugins {
	id 'java'
	id 'org.springframework.boot' version '2.6.2'
	id 'io.spring.dependency-management' version '1.0.11.RELEASE'
}

group = 'hyundai-4th'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17) //JDK:17
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	implementation 'org.apache.tomcat.embed:tomcat-embed-core:9.0.62'
	implementation 'org.apache.tomcat.embed:tomcat-embed-el:9.0.62'
	implementation 'org.apache.tomcat.embed:tomcat-embed-websocket:9.0.62'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}
dependencyManagement {
	imports {
		mavenBom "org.springframework:spring-framework-bom:5.2.19.RELEASE"
	}
}

tasks.named('test') {
	useJUnitPlatform()
}
