<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Car Service API Test Console</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        h2 { color: #0066cc; margin-top: 0; }
        h3 { margin-bottom: 8px; }
        input, button, textarea { margin: 5px; padding: 8px; }
        input { width: 260px; }
        .wide { width: 360px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 6px; white-space: pre-wrap; }
        .card { border: 1px solid #e6e6e6; border-radius: 10px; padding: 16px; margin-bottom: 18px; }
        .row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .muted { color: #666; font-size: 12px; }
    </style>
</head>
<body>
<h2>🚗 Car Service API Test Console</h2>

<!-- 사용자 API -->
<div class="card">
    <h3>회원가입</h3>
    <div class="row">
        <input id="email" placeholder="email@example.com" />
        <input id="password" placeholder="password" />
        <input id="name" placeholder="name" />
        <input id="phone" placeholder="phone" />
        <button onclick="createUser()">등록</button>
    </div>
</div>

<div class="card">
    <h3>조회</h3>
    <div class="row">
        <input id="userId" class="wide" placeholder="user_id (UUID)" />
        <button onclick="getById()">ID로 조회</button>
    </div>
    <div class="row">
        <input id="searchEmail" class="wide" placeholder="email@example.com" />
        <button onclick="getByEmail()">이메일로 조회</button>
    </div>
</div>

<div class="card">
    <h3>부분 수정</h3>
    <div class="row">
        <input id="patchId" class="wide" placeholder="user_id (UUID)" />
        <input id="patchPhone" placeholder="새 phone" />
        <input id="patchStatus" placeholder="새 status" />
        <button onclick="updateUser()">수정</button>
    </div>
</div>

<!-- 차량 문 제어 추가 섹션 -->
<div class="card">
    <h3>🚘 차량 문 제어</h3>
    <div class="row">
        <input id="doorVehicleId" class="wide" placeholder="vehicle_id (UUID)" />
        <button onclick="getDoorStatus()">상태조회</button>
        <button onclick="openDoor()">문 열기</button>
        <button onclick="closeDoor()">문 닫기</button>
    </div>
    <div class="muted">엔드포인트: <code>/api/v1/vehicles/{vehicle_id}/door</code> (GET 상태조회, POST { action: "OPEN" | "CLOSE" })</div>
    <h4>문 제어 응답</h4>
    <pre id="doorResult">...</pre>
</div>

<h3>응답 결과</h3>
<pre id="result">...</pre>

<script>
    // ===== Configuration =====
    // 상대 경로 사용 (추천)
    const BASE_USERS = "/spring4shell-test-1.0/api/v1/users";
    
    // 또는 동적 설정
    // const BASE_URL = window.location.origin;
    // const CONTEXT_PATH = "/spring4shell-test-1.0";
    // const BASE_USERS = `${BASE_URL}${CONTEXT_PATH}/api/v1/users`;

    function showResult(elId, res, text) {
      const header = `${res.status} ${res.statusText}`;
      try {
        const maybeJson = JSON.parse(text);
        document.getElementById(elId).textContent =
          `${header}\n` + JSON.stringify(maybeJson, null, 2);
      } catch(_) {
        document.getElementById(elId).textContent = `${header}\n${text || "(빈 응답)"}`;
      }
    }

    async function createUser() {
      const body = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim()
      };
      
      // 입력 검증 추가
      if (!body.email || !body.password || !body.name) {
        alert("필수 항목을 입력하세요");
        return;
      }
      
      try {
        console.log("Request URL:", BASE_USERS);
        console.log("Request Body:", body);
        
        const res = await fetch(BASE_USERS, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          credentials: "same-origin"
        });
        
        const text = await res.text();
        showResult("result", res, text);
        
        if (res.ok) {
          alert("등록 성공!");
        }
      } catch (e) {
        console.error("Error:", e);
        document.getElementById("result").textContent = `ERROR\n${e.message}`;
      }
    }

    async function getById() {
      const id = document.getElementById("userId").value.trim();
      if (!id) { 
        alert("user_id를 입력하세요"); 
        return; 
      }
      
      try {
        const url = `${BASE_USERS}/${encodeURIComponent(id)}`;
        console.log("Request URL:", url);
        
        const res = await fetch(url, { credentials: "same-origin" });
        const text = await res.text();
        showResult("result", res, text);
      } catch (e) {
        console.error("Error:", e);
        document.getElementById("result").textContent = `ERROR\n${e.message}`;
      }
    }

    async function getByEmail() {
      const email = document.getElementById("searchEmail").value.trim();
      if (!email) { 
        alert("email을 입력하세요"); 
        return; 
      }
      
      try {
        const url = `${BASE_USERS}?email=${encodeURIComponent(email)}`;
        console.log("Request URL:", url);
        
        const res = await fetch(url, { credentials: "same-origin" });
        const text = await res.text();
        showResult("result", res, text);
      } catch (e) {
        console.error("Error:", e);
        document.getElementById("result").textContent = `ERROR\n${e.message}`;
      }
    }

    async function updateUser() {
      const id = document.getElementById("patchId").value.trim();
      if (!id) { 
        alert("user_id를 입력하세요"); 
        return; 
      }
      
      const body = {};
      const phone = document.getElementById("patchPhone").value.trim();
      const status = document.getElementById("patchStatus").value.trim();
      
      if (phone) body.phone = phone;
      if (status) body.status = status;
      
      if (Object.keys(body).length === 0) {
        alert("수정할 항목을 입력하세요");
        return;
      }
      
      try {
        const url = `${BASE_USERS}/${encodeURIComponent(id)}`;
        console.log("Request URL:", url);
        console.log("Request Body:", body);
        
        const res = await fetch(url, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          credentials: "same-origin"
        });
        
        const text = await res.text();
        showResult("result", res, text);
        
        if (res.ok) {
          alert("수정 성공!");
        }
      } catch (e) {
        console.error("Error:", e);
        document.getElementById("result").textContent = `ERROR\n${e.message}`;
      }
    }
</script>
</body>
</html>
