<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>렌탈 반납 및 운행 정보 입력</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body { font-family: "Segoe UI", sans-serif; background:#f8f9fc; margin:0; padding:30px; }
        h1 { color:#222; margin-top:0; }
        .card { background:#fff; padding:20px; margin-bottom:18px; border-radius:12px; box-shadow:0 3px 12px rgba(0,0,0,.08); }
        label { display:block; margin:10px 0 6px; font-weight:600; color:#333; }
        input, textarea, select { width:100%; padding:10px; border:1px solid #d9dbe0; border-radius:8px; font-size:14px; box-sizing:border-box; }
        textarea { resize:vertical; min-height:80px; font-family: inherit; }
        button { background:#0069ff; color:#fff; border:0; padding:12px 20px; border-radius:8px; cursor:pointer; margin-top:12px; font-size:14px; }
        button:hover { background:#0053cc; }
        .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; }
        .muted { color:#6b7280; font-size:13px; margin-top:6px; }
        .success { background:#d1fae5; color:#065f46; padding:12px; border-radius:8px; margin-top:12px; }
        .error { background:#fee2e2; color:#991b1b; padding:12px; border-radius:8px; margin-top:12px; }
        @media (max-width: 860px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<h1>렌탈 반납 및 운행 정보 입력</h1>

<div class="card">
    <h3>렌탈 ID 입력</h3>
    <label for="rentalId">렌탈 ID</label>
    <input id="rentalId" placeholder="렌탈 ID를 입력하세요" />
    <div class="muted">진행 중인 렌탈의 ID를 입력해주세요</div>
</div>

<div class="card">
    <h3>반납 정보</h3>
    <div class="grid-2">
        <div>
            <label for="endMeter">종료 주행거리 (km)</label>
            <input id="endMeter" type="number" min="0" step="1" placeholder="예: 12345" />
            <div class="muted">차량 계기판의 총 주행거리를 입력하세요</div>
        </div>
        <div>
            <label for="endActual">반납 시간</label>
            <input id="endActual" type="datetime-local" />
        </div>
    </div>
</div>

<div class="card">
    <h3>운행 정보 (수동 입력)</h3>
    <div class="muted" style="margin-bottom:12px;">실제 운행이 아니므로 운행 정보를 직접 입력해주세요</div>

    <div class="grid-3">
        <div>
            <label for="totalDistance">총 운행 거리 (km)</label>
            <input id="totalDistance" type="number" min="0" step="0.1" placeholder="예: 25.5" />
            <div class="muted">이번 렌탈 동안 주행한 거리</div>
        </div>
        <div>
            <label for="averageSpeed">평균 속도 (km/h)</label>
            <input id="averageSpeed" type="number" min="0" step="0.1" placeholder="예: 45.5" />
        </div>
        <div>
            <label for="maxSpeed">최고 속도 (km/h)</label>
            <input id="maxSpeed" type="number" min="0" step="0.1" placeholder="예: 80.0" />
        </div>
    </div>

    <div style="margin-top:12px;">
        <label for="tripSummary">운행 요약</label>
        <textarea id="tripSummary" placeholder="운행 경로나 특이사항을 입력하세요 (선택사항)"></textarea>
    </div>
</div>

<div class="card">
    <button id="btnReturn">반납 완료</button>
    <div id="resultMessage"></div>
</div>

<script>
    const $ = (id) => document.getElementById(id);

    // 기본값: 현재 시간
    (function initDateTime(){
        const now = new Date();
        const pad = (n) => String(n).padStart(2,'0');
        const toLocal = (d) => d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
                               'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        if (!$("endActual").value) $("endActual").value = toLocal(now);
    })();

    // 반납 처리
    $("btnReturn").addEventListener("click", async () => {
        const rentalId = $("rentalId").value.trim();
        const endMeter = $("endMeter").value.trim();
        const endActual = $("endActual").value;

        if (!rentalId) {
            showMessage("렌탈 ID를 입력하세요", "error");
            return;
        }
        if (!endMeter) {
            showMessage("종료 주행거리를 입력하세요", "error");
            return;
        }
        if (!endActual) {
            showMessage("반납 시간을 입력하세요", "error");
            return;
        }

        // LocalDateTime -> epoch milliseconds
        const endActualMs = new Date(endActual).getTime();

        // 운행 정보
        const totalDistance = $("totalDistance").value.trim();
        const averageSpeed = $("averageSpeed").value.trim();
        const maxSpeed = $("maxSpeed").value.trim();
        const tripSummary = $("tripSummary").value.trim();

        // FormData 생성 (application/x-www-form-urlencoded)
        const formData = new URLSearchParams();
        formData.append("endMeter", endMeter);
        formData.append("endActualEpochMs", endActualMs);

        if (totalDistance) formData.append("totalDistance", totalDistance);
        if (averageSpeed) formData.append("averageSpeed", averageSpeed);
        if (maxSpeed) formData.append("maxSpeed", maxSpeed);
        if (tripSummary) formData.append("tripSummary", tripSummary);

        try {
            const url = "/api/v1/rentals/" + encodeURIComponent(rentalId);
            const res = await fetch(url, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: formData.toString()
            });

            if (!res.ok) {
                const errorText = await res.text();
                showMessage("반납 실패: " + res.status + " - " + errorText, "error");
                return;
            }

            const data = await res.json();
            showMessage("반납이 완료되었습니다! 렌탈 ID: " + data.rentalId + ", 상태: " + data.status, "success");

            // 폼 초기화
            $("rentalId").value = "";
            $("endMeter").value = "";
            $("totalDistance").value = "";
            $("averageSpeed").value = "";
            $("maxSpeed").value = "";
            $("tripSummary").value = "";

        } catch (err) {
            showMessage("오류 발생: " + err.message, "error");
        }
    });

    function showMessage(msg, type) {
        const div = $("resultMessage");
        div.textContent = msg;
        div.className = type;
        setTimeout(() => {
            div.textContent = "";
            div.className = "";
        }, 5000);
    }
</script>
</body>
</html>
