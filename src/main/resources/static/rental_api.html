<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Rental API Tester</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body { font-family: system-ui, Arial, sans-serif; max-width: 900px; margin: 30px auto; }
        .card, fieldset { border: 1px solid #ddd; border-radius: 12px; padding: 18px; margin-bottom: 22px; }
        label { display: block; margin: 8px 0 4px; }
        input, button { padding: 10px; border-radius: 8px; }
        input { width: 100%; border: 1px solid #ccc; }
        button { cursor: pointer; }
        .actions { margin: 14px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .muted { color: #555; }
    </style>
</head>
<body>
<h1>Rental API Tester <span class="muted">/api/v1</span></h1>
<div class="card">
    <label>Base URL</label>
    <input id="baseUrl" value="http://localhost:8080" />
    <label>Auth Header (optional) <span class="muted">e.g. Bearer ...</span></label>
    <input id="auth" placeholder="Authorization Value" />
    <div class="actions">
        <button id="btnSaveEnv">Save</button>
        <button id="btnResetEnv">Reset</button>
    </div>
</div>

<h2>Start Rental (POST /api/v1/rentals)</h2>
<form id="formStart" class="card">
    <div class="grid">
        <div>
            <label>Reservation ID</label>
            <input id="reservationId" required>
        </div>
        <div>
            <label>User ID</label>
            <input id="userId" required>
        </div>
        <div>
            <label>Vehicle ID</label>
            <input id="vehicleId" required>
        </div>
        <div>
            <label>Start Odometer (km)</label>
            <input id="startMeter" type="number" required>
        </div>
    </div>
    <div class="actions">
        <button type="button" id="btnFillStart">Fill Sample</button>
        <button type="submit" id="btnCallStart">Send Request</button>
    </div>
    <div class="card muted">
        <span>Payload Preview (read-only)</span>
        <pre id="previewStart">{}</pre>
    </div>
    <div class="card muted">
        <span>Response</span>
        <pre id="respStart">{}</pre>
    </div>
</form>

<h2>Return (PATCH /api/v1/rentals/{rentalId})</h2>
<form id="formReturn" class="card">
    <div class="grid">
        <div>
            <label>Rental ID</label>
            <input id="rentalId" required>
        </div>
        <div>
            <label>Return Odometer (km)</label>
            <input id="endMeter" type="number" required>
        </div>
    </div>
    <div class="actions">
        <button type="button" id="btnUseLast">Load Last</button>
        <button type="button" id="btnFillReturn">Fill Sample</button>
        <button type="submit" id="btnCallReturn">Send Request</button>
    </div>
    <div class="card muted">
        <span>Payload Preview (read-only)</span>
        <pre id="previewReturn">{}</pre>
    </div>
    <div class="card muted">
        <span>Response</span>
        <pre id="respReturn">{}</pre>
    </div>
</form>

<script>
    // 기본 세팅 및 유틸
    function nowISO() {
      return new Date().toISOString();
    }
    function headers() {
      const auth = document.getElementById('auth').value.trim();
      return {
        "Content-Type": "application/json",
        ...(auth && { "Authorization": auth })
      };
    }
    function fmt(v) { return JSON.stringify(v, null, 2); }

    // 환경 저장/복원
    document.getElementById('btnSaveEnv').onclick = () => {
      localStorage.setItem('baseUrl', document.getElementById('baseUrl').value);
      localStorage.setItem('auth', document.getElementById('auth').value);
    };
    document.getElementById('btnResetEnv').onclick = () => {
      localStorage.clear();
      document.getElementById('baseUrl').value = 'http://localhost:8080';
      document.getElementById('auth').value = '';
    };
    document.getElementById('baseUrl').value = localStorage.getItem('baseUrl') || 'http://localhost:8080';
    document.getElementById('auth').value = localStorage.getItem('auth') || '';

    // 샘플 채우기 (데모용 UUID)
    document.getElementById('btnFillStart').onclick = () => {
      document.getElementById('reservationId').value = '9b5e0a16-2e7e-4a7c-b0b0-aaaaaaaaaaaa';
      document.getElementById('userId').value = 'e9f9f1d2-7a90-4d7c-9f4e-3a9c2fa0c0a1';
      document.getElementById('vehicleId').value = '3a7ee4a4-3f7a-46b1-9b3e-8f9e3c4d1b2c';
      document.getElementById('startMeter').value = 12034;
      updateStartPreview();
    };
    function updateStartPreview() {
      const data = {
        reservation_id: document.getElementById('reservationId').value.trim(),
        user_id: document.getElementById('userId').value.trim(),
        vehicle_id: document.getElementById('vehicleId').value.trim(),
        start_actual: nowISO(),
        start_meter: parseInt(document.getElementById('startMeter').value) || 0
      };
      document.getElementById('previewStart').textContent = fmt(data);
    }
    ['reservationId','userId','vehicleId','startMeter'].forEach(id => {
      document.getElementById(id).oninput = updateStartPreview;
    });

    // 대여시작 요청
    document.getElementById('formStart').onsubmit = async (e) => {
      e.preventDefault();
      updateStartPreview();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const data = JSON.parse(document.getElementById('previewStart').textContent);
      const respBox = document.getElementById('respStart');
      try {
        const res = await fetch(baseUrl + '/api/v1/rentals', {
          method: 'POST', headers: headers(), body: JSON.stringify(data)
        });
        const txt = await res.text();
        respBox.textContent = txt;
        // 성공시 rental_id 저장 (반납에 활용)
        try {
          const js = JSON.parse(txt);
          if(js.rental_id)
            localStorage.setItem('lastRentalId', js.rental_id);
        } catch {}
      } catch (err) {
        respBox.textContent = String(err);
      }
    };

    // 반납 샘플/불러오기
    document.getElementById('btnFillReturn').onclick = () => {
      document.getElementById('rentalId').value = localStorage.getItem('lastRentalId') || 'd50fcd70-2c59-43c4-b028-bbbbbbbbbbbb';
      document.getElementById('endMeter').value = 12580;
      updateReturnPreview();
    };
    document.getElementById('btnUseLast').onclick = () => {
      document.getElementById('rentalId').value = localStorage.getItem('lastRentalId') || '';
      updateReturnPreview();
    };
    function updateReturnPreview() {
      const data = {
        end_actual: nowISO(),
        end_meter: parseInt(document.getElementById('endMeter').value) || 0
      };
      document.getElementById('previewReturn').textContent = fmt(data);
    }
    ['rentalId','endMeter'].forEach(id => {
      document.getElementById(id).oninput = updateReturnPreview;
    });

    // 반납 요청
    document.getElementById('formReturn').onsubmit = async (e) => {
      e.preventDefault();
      updateReturnPreview();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const rentalId = document.getElementById('rentalId').value.trim();
      const data = JSON.parse(document.getElementById('previewReturn').textContent);
      const respBox = document.getElementById('respReturn');
      try {
        const res = await fetch(baseUrl + '/api/v1/rentals/' + encodeURIComponent(rentalId), {
          method: 'PATCH', headers: headers(), body: JSON.stringify(data)
        });
        respBox.textContent = await res.text();
      } catch (err) {
        respBox.textContent = String(err);
      }
    };
    // 미리보기 자동 갱신
    updateStartPreview(); updateReturnPreview();
</script>
</body>
</html>
