<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>차량 검색</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
          font-family: "Segoe UI", sans-serif;
          background: #f8f9fc;
          margin: 0;
          padding: 30px;
        }
        h1 {
          color: #222;
        }
        form {
          background: #fff;
          padding: 20px;
          border-radius: 12px;
          box-shadow: 0 3px 12px rgba(0,0,0,0.1);
          margin-bottom: 20px;
        }
        label {
          display: block;
          margin-bottom: 5px;
          color: #333;
          font-weight: bold;
        }
        input {
          width: 100%;
          padding: 10px;
          margin-bottom: 12px;
          border: 1px solid #ccc;
          border-radius: 6px;
          font-size: 14px;
        }
        button {
          background: #007bff;
          color: white;
          border: none;
          padding: 10px 16px;
          border-radius: 6px;
          cursor: pointer;
        }
        button:hover {
          background: #0056b3;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          background: #fff;
          border-radius: 10px;
          overflow: hidden;
        }
        th, td {
          padding: 10px 12px;
          border-bottom: 1px solid #eee;
          text-align: left;
        }
        th {
          background: #f0f2f6;
          font-weight: 600;
        }
        .status {
          font-weight: bold;
          color: #007bff;
        }
    </style>
</head>
<body>

<h1>🚗 차량 검색</h1>

<form id="searchForm">
    <label for="pickupLocationId">Pickup Location ID</label>
    <input type="text" id="pickupLocationId" value="11111111-1111-1111-1111-111111111111" required>

    <label for="availableFrom">Available From</label>
    <input type="datetime-local" id="availableFrom" required>

    <label for="availableTo">Available To</label>
    <input type="datetime-local" id="availableTo" required>

    <label for="page">Page</label>
    <input type="number" id="page" value="0">

    <label for="size">Size</label>
    <input type="number" id="size" value="10">

    <button type="submit">검색하기</button>
</form>

<table id="resultTable" style="display:none;">
    <thead>
    <tr>
        <th>브랜드</th>
        <th>모델</th>
        <th>연식</th>
        <th>번호판</th>
        <th>상태</th>
        <th>VIN</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    // ISO 8601 UTC 변환 함수
    function toUTC(dateStr) {
      const local = new Date(dateStr);
      return new Date(local.getTime() - local.getTimezoneOffset() * 60000).toISOString();
    }

    const form = document.getElementById("searchForm");
    const resultTable = document.getElementById("resultTable");
    const tbody = resultTable.querySelector("tbody");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const pickupLocationId = document.getElementById("pickupLocationId").value;
      const availableFrom = toUTC(document.getElementById("availableFrom").value);
      const availableTo = toUTC(document.getElementById("availableTo").value);
      const page = document.getElementById("page").value;
      const size = document.getElementById("size").value;

      const url = `/api/v1/vehicles?pickup_location_id=${pickupLocationId}&available_from=${availableFrom}&available_to=${availableTo}&page=${page}&size=${size}`;

      const res = await fetch(url);
      if (!res.ok) {
        alert("검색 실패 (" + res.status + ")");
        return;
      }

      const vehicles = await res.json();
      tbody.innerHTML = "";
      resultTable.style.display = "table";

      vehicles.forEach(v => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${v.brand}</td>
          <td>${v.model}</td>
          <td>${v.year}</td>
          <td>${v.plate}</td>
          <td class="status">${v.status}</td>
          <td>${v.vin}</td>
        `;
        tbody.appendChild(row);
      });
    });
</script>

</body>
</html>
