# Spring4Shell Vulnerable App Configuration
# 교육 목적으로만 사용

# MySQL Database Configuration
# Environment variables will be set by Terraform via EC2 User Data
spring.datasource.url=jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/${DB_NAME:appdb}?serverTimezone=UTC&createDatabaseIfNotExist=TRUE
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:00000000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.root=INFO
logging.level.com.security.test=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# RestTemplate 로깅 (외부 API 호출 로그)
logging.level.com.security.test.config.RestTemplateLoggingInterceptor=INFO

# HTTP 클라이언트 상세 로깅 (선택 사항 - 매우 상세함)
