<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Login Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { margin: 5px 0; padding: 8px; width: 250px; }
    button { margin-top: 10px; padding: 8px 16px; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
<h2>🚗 Car Service 로그인 테스트</h2>

<label>Email</label><br>
<input id="email" type="text" placeholder="alice@example.com"><br>

<label>Password</label><br>
<input id="password" type="password" placeholder="비밀번호 입력"><br>

<button onclick="login()">로그인</button>

<h3>결과:</h3>
<pre id="result">(응답이 여기에 표시됩니다)</pre>

<script>
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/spring4shell-test-1.0/api/v1/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const text = await response.text();
    document.getElementById("result").textContent =
      `Status: ${response.status}\n\n${text}`;
  }
</script>
</body>
</html>
